# Воспроизведение окружения проекта.
# Создаем чистый conda env с Python и ставим все пакеты через pip из
# requirements.txt. Так избегаем рассинхрона conda-сборок (matplotlib, BLAS).
#
#   conda env create -f environment.yml
#   conda activate dka
#
name: dka
channels:
  - conda-forge
dependencies:
  - python=3.11.15
  - pip
  - pip:
      - -r requirements.txt
